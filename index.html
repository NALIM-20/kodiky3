```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Neon Cocktail Dashboard</title>

<style>

body{
margin:0;
padding:20px;
font-family:Arial;
background:black;
color:#ff7a00;
}

h1{
text-align:center;
font-size:40px;
text-shadow:0 0 10px #ff7a00,0 0 20px #ffaa33;
}

#cocktails{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:30px;
}

.card{
background:#111;
border:2px solid #ff7a00;
border-radius:12px;
width:170px;
padding:10px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px #ffaa33;
}

.card img{
width:100%;
border-radius:8px;
margin-bottom:5px;
}

.card h3{
font-size:15px;
}

.search{
text-align:center;
margin-top:20px;
}

input{
padding:10px;
border-radius:6px;
border:1px solid #ff7a00;
background:black;
color:#ff7a00;
}

button{
padding:10px 14px;
border:none;
border-radius:6px;
background:#ff7a00;
color:black;
cursor:pointer;
}

button:hover{
background:#ffaa33;
}

</style>

</head>

<body>

<h1>🍹 Neon Cocktail</h1>

<div class="search">
<input id="searchInput" placeholder="Search cocktail...">
<button onclick="searchCocktail()">Search</button>
</div>

<div id="cocktails"></div>

<script>

const container = document.getElementById("cocktails")

async function loadRandomCocktails(){

container.innerHTML=""

let letters = ["a","b","c","d","e"]
let allDrinks = []

for(let letter of letters){

let res = await fetch("https://www.thecocktaildb.com/api/json/v1/1/search.php?f="+letter)
let data = await res.json()

if(data.drinks){
allDrinks = allDrinks.concat(data.drinks)
}

}

allDrinks.slice(0,20).forEach(drink => {

const card = document.createElement("div")
card.className="card"

const img = document.createElement("img")
img.src = drink.strDrinkThumb

const title = document.createElement("h3")
title.textContent = drink.strDrink

card.appendChild(img)
card.appendChild(title)

container.appendChild(card)

})

}

function searchCocktail(){

const value = document.getElementById("searchInput").value

container.innerHTML=""

fetch("https://www.thecocktaildb.com/api/json/v1/1/search.php?s="+value)
.then(res => res.json())
.then(data => {

if(!data.drinks){
container.innerHTML="<p>No cocktails found</p>"
return
}

data.drinks.forEach(drink => {

const card = document.createElement("div")
card.className="card"

const img = document.createElement("img")
img.src = drink.strDrinkThumb

const title = document.createElement("h3")
title.textContent = drink.strDrink

card.appendChild(img)
card.appendChild(title)

container.appendChild(card)

})

})

}

loadRandomCocktails()

</script>

</body>
</html>
```
